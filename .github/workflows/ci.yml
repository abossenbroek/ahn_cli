name: CI

on:
  push:
    branches:
      - main
  pull_request:
  schedule:
    # Nightly portal-contract tier: 03:17 UTC daily. Runs the live PDOK /
    # Beeldmateriaal contract checks (make test-nightly) that the fast tier
    # deselects, so a drift in the real feeds is caught out of band.
    - cron: "17 3 * * *"

jobs:
  # Fast tier: fully mocked/offline, 100% branch coverage, on every push and PR.
  ci:
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --dev

      - name: Linting
        run: make lint

      - name: Typos checking
        run: make typos

      - name: Format checking
        run: make format-check

      - name: Type checking
        run: make typecheck

      - name: Testing
        run: make test

  # Nightly tier: live portal-contract checks against the real distribution
  # portals. Scheduled only, so PRs stay fully offline.
  nightly:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --dev

      - name: Portal-contract checks (live)
        run: make test-nightly
