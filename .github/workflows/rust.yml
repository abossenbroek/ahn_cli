# hf-v2 Task 1b interop spike CI. Runs the throwaway `rust/spike-poc` crate on
# three OSes and the Python<->Rust cross-language round-trip. `paths:` is left
# unrestricted for the spike; Phase 4 replaces this with the filtered matrix
# from the plan.
name: rust-spike

on:
  push:
    branches: [hf-v2]
  workflow_dispatch:

defaults:
  run:
    shell: bash

jobs:
  # fmt + clippy, cheap, ubuntu only.
  spike-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: cargo fmt --check
        working-directory: rust/spike-poc
        run: cargo fmt --all --check
      - name: cargo clippy -D warnings
        working-directory: rust/spike-poc
        run: cargo clippy --all-targets --all-features -- -D warnings

  # cargo test on all three OSes, stable. MSVC build of zstd-sys with no extra
  # system deps is itself one of the doubts — this job is where it is proven.
  spike-test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        # avoid autocrlf mangling the committed text fixtures/data on Windows
      - name: disable autocrlf
        run: git config --global core.autocrlf false
      - uses: dtolnay/rust-toolchain@stable
      - name: build (records MSVC zstd-sys build on windows)
        working-directory: rust/spike-poc
        run: cargo build --all-features --tests
      - name: test (verbose, shows [bench] numbers)
        working-directory: rust/spike-poc
        run: cargo test --all-features -- --nocapture

  # Python producer byte-determinism per OS + Rust decodes the fixtures.
  cross-language:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: disable autocrlf
        run: git config --global core.autocrlf false
      - uses: dtolnay/rust-toolchain@stable
      - name: install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - name: uv sync
        run: uv sync
      # Spike producer determinism (I own this): HARD gate on all three OSes.
      - name: regenerate spike golden vectors + packs
        run: uv run python rust/spike-poc/tools/gen_vectors.py
      - name: assert spike vectors byte-identical to committed (per-OS)
        run: git diff --exit-code rust/spike-poc/tests/data
      # Production tiles3d producer determinism. RED-2: the existing v1 writers
      # use Path.write_text (text mode), so on Windows they emit CRLF and the
      # build's own byte-identity verifier rejects it — the current tiles3d
      # build cannot run on Windows. Documented in the spike results doc; the
      # Phase-3 fix is newline="\n"/write_bytes. Non-blocking on Windows ONLY so
      # the finding is surfaced (visible failed-but-allowed step) without hiding
      # a genuine NEW determinism regression on Unix.
      - name: regenerate loose fixtures (producer determinism)
        continue-on-error: ${{ matrix.os == 'windows-latest' }}
        run: uv run python -m tests.tiles3d.regen_rust_fixtures
      - name: assert loose fixtures byte-identical to committed (per-OS)
        continue-on-error: ${{ matrix.os == 'windows-latest' }}
        run: git diff --exit-code tests/tiles3d/fixtures/rust-consumer
      - name: Rust decodes every fixture + pack + golden vector
        working-directory: rust/spike-poc
        run: cargo test --all-features
