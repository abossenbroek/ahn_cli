# Fast pre-commit gates. Ruff and pyright come from their official upstream
# mirrors (pinned). The pyright mirror runs pyright in its own isolated
# environment, so [tool.pyright] sets venvPath/venv to the uv-managed .venv --
# that lets BOTH this hook and CI's `uv run pyright` resolve third-party imports
# (laspy, geopandas, ...) identically. The full test suite + 100% coverage gate,
# and the typos check, are left to CI (`make check`). Install once with:
# uv run pre-commit install
repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.21
    hooks:
      - id: ruff-check
      - id: ruff-format

  - repo: https://github.com/RobertCraigie/pyright-python
    rev: v1.1.411
    hooks:
      - id: pyright
        pass_filenames: false
        always_run: true
